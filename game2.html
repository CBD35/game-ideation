<!DOCTYPE html>
<html>
<head>
  <title>Kingdom Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e1218;
      color: #c8d4e0;
      font-family: Georgia, serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    #game {
      background: #12181f;
      border: 1px solid #2a3545;
      border-radius: 14px;
      padding: 36px;
      max-width: 560px;
      width: 100%;
    }

    #progress {
      font-size: 13px;
      color: #6a7f94;
      margin-bottom: 6px;
    }

    #progress-bar-wrap {
      background: #1a2230;
      border-radius: 4px;
      height: 6px;
      margin-bottom: 28px;
    }

    #progress-bar {
      height: 6px;
      border-radius: 4px;
      background: linear-gradient(90deg, #c9a84c, #f0d080);
      transition: width 0.4s ease;
      width: 0%;
    }

    #question-text {
      font-size: 22px;
      color: #f0d080;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .answer-btn {
      display: block;
      width: 100%;
      background: #1a2230;
      border: 1px solid #2a3545;
      border-radius: 8px;
      color: #c8d4e0;
      font-family: Georgia, serif;
      font-size: 16px;
      padding: 14px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .answer-btn:hover { border-color: #c9a84c; background: #1f2d3d; }
    .answer-btn.correct { background: rgba(46,204,113,0.15); border-color: #2ecc71; color: #2ecc71; }
    .answer-btn.wrong   { background: rgba(192,57,43,0.15);  border-color: #c0392b; color: #c0392b; }
    .answer-btn:disabled { cursor: default; }

    #feedback {
      margin-top: 16px;
      font-size: 15px;
      min-height: 24px;
      font-style: italic;
      color: #6a7f94;
    }

    #next-btn {
      margin-top: 20px;
      background: linear-gradient(135deg, #c9a84c, #a07828);
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: Georgia, serif;
      font-size: 16px;
      font-weight: bold;
      padding: 14px 32px;
      cursor: pointer;
      display: none;
    }
    #next-btn:hover { filter: brightness(1.1); }

    #score-display {
      font-size: 14px;
      color: #6a7f94;
      margin-top: 20px;
    }

    /* Results screen */
    #results {
      display: none;
      text-align: center;
    }
    #results h2 {
      font-size: 32px;
      color: #f0d080;
      margin-bottom: 8px;
    }
    #results p {
      color: #6a7f94;
      margin-bottom: 24px;
      font-size: 16px;
    }
    #result-score {
      font-size: 64px;
      font-weight: bold;
      color: #f0d080;
      margin: 16px 0;
    }
    #result-message {
      font-size: 18px;
      margin-bottom: 28px;
      color: #c8d4e0;
    }
    #restart-btn {
      background: linear-gradient(135deg, #c9a84c, #a07828);
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: Georgia, serif;
      font-size: 16px;
      font-weight: bold;
      padding: 14px 40px;
      cursor: pointer;
    }
    #restart-btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
<div id="game">

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <div id="progress">Question 1 of 5</div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="question-text"></div>
    <div id="answers"></div>
    <div id="feedback"></div>
    <button id="next-btn" onclick="nextQuestion()">Next Question →</button>
    <div id="score-display">Score: 0</div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results">
    <h2>⚔ Quest Complete</h2>
    <p>Here's how you did:</p>
    <div id="result-score"></div>
    <div id="result-message"></div>
    <button id="restart-btn" onclick="restartQuiz()">Play Again</button>
  </div>

</div>

<script>
  // ===========================
  // THE QUESTIONS
  // Add your own by following
  // the same pattern below!
  // ===========================
  let questions = [
    {
      question: "🏰 A dragon attacks your castle. What do you do first?",
      answers: [
        "Send your knights to fight it",
        "Evacuate the villagers to safety",
        "Try to negotiate with the dragon",
        "Hide in the dungeon"
      ],
      correct: 1,
      explanation: "Always protect your people first — a good ruler thinks of lives before glory."
    },
    {
      question: "⚔ Your army is outnumbered 3 to 1. What's your best move?",
      answers: [
        "Charge head-on — glory or death!",
        "Retreat and live to fight another day",
        "Use the terrain to set an ambush",
        "Send a single hero as a distraction"
      ],
      correct: 2,
      explanation: "Using terrain for ambush is a classic military strategy — brains beat brawn."
    },
    {
      question: "🧙 A wizard offers you one gift. Which do you choose?",
      answers: [
        "Unlimited gold",
        "An undefeatable army",
        "Knowledge of the future",
        "Immortality"
      ],
      correct: 2,
      explanation: "Knowledge of the future lets you prevent threats before they happen — wisdom is the ultimate power."
    },
    {
      question: "🌲 You discover a magical forest that produces rare herbs. What do you do?",
      answers: [
        "Clear it to build a new village",
        "Harvest all the herbs immediately",
        "Protect it and harvest sustainably",
        "Keep it secret from everyone"
      ],
      correct: 2,
      explanation: "Sustainable use means the resource lasts forever — short-term greed destroys long-term wealth."
    },
    {
      question: "👑 A neighboring king offers peace — but his terms seem unfair. You...",
      answers: [
        "Refuse and prepare for war",
        "Accept everything to avoid conflict",
        "Negotiate for better terms",
        "Secretly plan a surprise attack"
      ],
      correct: 2,
      explanation: "Negotiation is how real-world diplomacy works — rarely accept the first offer."
    },
    {
      question: "You see a princess from a far away land and her father offers you her hand in marriage or he will attack your kingdom. What do you do?",
      answers: [
        "Refuse and prepare for war",
        "Kidnap the princess and demand a ransom",
        "Kill the king and take the princess for yourself",
        "Accept the marriage proposal and form an alliance"
      ],
      correct: 2,
      explanation: "Bowing down to others is never the answer - sometimes you have to prove yourself instead"
    },
  ];

  // ===========================
  // THE GAME STATE
  // ===========================
  let currentQuestion = 0;
  let score = 0;
  let answered = false;

  // ===========================
  // SHOW A QUESTION
  // ===========================
  function showQuestion() {
    let q = questions[currentQuestion];
    answered = false;

    // Update progress bar
    let percent = (currentQuestion / questions.length) * 100;
    document.getElementById('progress-bar').style.width = percent + '%';
    document.getElementById('progress').textContent =
      'Question ' + (currentQuestion + 1) + ' of ' + questions.length;

    // Show the question text
    document.getElementById('question-text').textContent = q.question;

    // Clear old feedback and hide Next button
    document.getElementById('feedback').textContent = '';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('score-display').textContent = 'Score: ' + score;

    // Build the answer buttons
    let answersDiv = document.getElementById('answers');
    answersDiv.innerHTML = ''; // clear old buttons

    for (let i = 0; i < q.answers.length; i++) {
      let btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = q.answers[i];
      btn.onclick = function() { checkAnswer(i, btn); };
      answersDiv.appendChild(btn);
    }
  }

  // ===========================
  // CHECK IF ANSWER IS RIGHT
  // ===========================
  function checkAnswer(chosen, clickedBtn) {
    if (answered) return; // can't answer twice
    answered = true;

    let q = questions[currentQuestion];
    let allButtons = document.querySelectorAll('.answer-btn');

    // Disable all buttons
    allButtons.forEach(function(btn) { btn.disabled = true; });

    if (chosen === q.correct) {
      score = score + 1;
      clickedBtn.classList.add('correct');
      document.getElementById('feedback').textContent = '✅ Correct! ' + q.explanation;
      document.getElementById('feedback').style.color = '#2ecc71';
    } else {
      clickedBtn.classList.add('wrong');
      allButtons[q.correct].classList.add('correct'); // show the right answer
      document.getElementById('feedback').textContent = '❌ Not quite. ' + q.explanation;
      document.getElementById('feedback').style.color = '#c0392b';
    }

    document.getElementById('score-display').textContent = 'Score: ' + score;
    document.getElementById('next-btn').style.display = 'inline-block';
  }

  // ===========================
  // MOVE TO NEXT QUESTION
  // ===========================
  function nextQuestion() {
    currentQuestion = currentQuestion + 1;

    if (currentQuestion >= questions.length) {
      showResults();
    } else {
      showQuestion();
    }
  }

  // ===========================
  // SHOW THE RESULTS SCREEN
  // ===========================
  function showResults() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    let total = questions.length;
    document.getElementById('result-score').textContent = score + ' / ' + total;

    // Different message depending on score
    let message = '';
    if (score === total) {
      message = '🏆 Perfect score! You were born to rule.';
    } else if (score >= total * 0.6) {
      message = '⚔ Well fought, Commander. Train harder and you\'ll be unstoppable.';
    } else {
      message = '📜 Every great ruler starts as a student. Study the ways of the kingdom.';
    }

    document.getElementById('result-message').textContent = message;
  }

  // ===========================
  // RESTART THE QUIZ
  // ===========================
  function restartQuiz() {
    currentQuestion = 0;
    score = 0;
    answered = false;
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    showQuestion();
  }

  // Start the game
  showQuestion();
</script>
</body>
</html>
